<style>
/* ── Ryokan color tokens ── */
:root{
  --bg:#f4ede2;--surface:#fffdf7;--accent:#7c1c2c;--navy:#1b2d4f;
  --gold:#8a6f3a;--border:#d5c8b0;--border-lt:#e8dece;
  --text:#1a1510;--sub:#5a4a38;--muted:#9c8870;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
html,body,#root{height:100%;margin:0;padding:0;}
body{
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  font-family:'Hiragino Mincho ProN','Hiragino Mincho Pro','Yu Mincho','YuMincho','Noto Serif JP','Georgia',serif;
  overscroll-behavior:none;
  color:var(--text);
  letter-spacing:.04em;
}
/* ── App shell ── */
.app-shell{
  display:flex;flex-direction:column;
  height:100%;width:100%;max-width:480px;margin:0 auto;
  background:var(--bg);position:relative;overflow:hidden;
}
/* ── Desktop ── */
@media(min-width:768px){
  html,body,#root{height:100vh;}
  .app-shell{max-width:100%;}
  .app-main>*{max-width:920px;margin-left:auto;margin-right:auto;width:100%;}
  .app-nav{display:none !important;}
  .site-header{display:flex !important;}
  .edit-fab{bottom:28px;right:40px;}
}
/* ── Site header (desktop only) ── */
.site-header{
  display:none;flex-shrink:0;
  align-items:center;background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 56px;height:64px;
}
.site-header-logo{
  font-size:13px;letter-spacing:.3em;color:var(--accent);font-weight:700;
  border-left:3px solid var(--accent);padding-left:14px;margin-right:auto;
}
.site-header-nav{display:flex;}
.site-nav-btn{
  background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:11px;letter-spacing:.2em;color:var(--sub);
  padding:0 22px;height:64px;border-bottom:2px solid transparent;
  transition:color .2s,border-bottom-color .2s;
}
.site-nav-btn:hover{color:var(--accent);}
.site-nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
/* ── Bottom nav (mobile) ── */
.app-nav{
  flex-shrink:0;background:var(--surface);
  border-top:1px solid var(--border);display:flex;
}
/* ── Edit FAB ── */
.edit-fab{
  position:absolute;bottom:72px;right:14px;
  width:42px;height:42px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
  box-shadow:0 3px 14px rgba(0,0,0,.25);
  transition:transform .15s,opacity .15s;z-index:20;
}
.edit-fab:active{transform:scale(.92);}
.edit-banner{
  background:#ede8df;border-bottom:1px solid var(--border);
  text-align:center;padding:7px;font-size:11px;letter-spacing:.14em;
  font-weight:700;color:var(--navy);flex-shrink:0;
}
/* ── Animations ── */
.tab-content{animation:fadeSlide .2s ease-out both;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* ── Edit inputs ── */
.edit-input{
  background:rgba(255,253,247,.95);border:1px solid var(--navy);
  border-radius:2px;padding:5px 9px;width:100%;
  font-size:inherit;font-family:inherit;color:var(--text);outline:none;resize:none;
}
.edit-input:focus{border-color:var(--accent);}
.edit-list-input{
  background:rgba(255,253,247,.95);border:1px solid var(--navy);
  border-radius:2px;padding:4px 8px;font-size:.75rem;
  font-family:inherit;outline:none;flex:1;color:var(--text);
}
/* ── Toast ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:8px 22px;border-radius:2px;font-size:11px;letter-spacing:.12em;z-index:9999;pointer-events:none;animation:toastIn .2s ease-out;}
@keyframes toastIn{from{opacity:0;top:8px}to{opacity:1;top:16px}}
/* ── Card base ── */
.ryokan-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px;}
/* ── Section label ── */
.ryokan-label{
  display:flex;align-items:center;gap:10px;
  font-size:10px;letter-spacing:.25em;color:var(--muted);margin-bottom:16px;
}
.ryokan-label::after{content:'';flex:1;height:1px;background:var(--border-lt);}
::-webkit-scrollbar{display:none;}

/* ── Context ── */
const Ctx = React.createContext();

function useData(){return useContext(Ctx);}

/* ── Toast ── */
function showToast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1800);
}

/* ── useLocalStorage ── */
function useLS(key,def){
  const [v,sv]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}
  });
  const set=(nv)=>{sv(nv);try{localStorage.setItem(key,JSON.stringify(nv));}catch{}};
  return[v,set];
}

/* ── EditableText ── */
function ET({val,onChange,multi=false,cls='',placeholder=''}){
  const{edit}=useData();
  if(!edit)return <span className={cls} style={{whiteSpace:'pre-wrap'}}>{val||<span className="text-stone-300">{placeholder}</span>}</span>;
  if(multi)return<textarea className={`edit-input ${cls}`} value={val} rows={3} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>;
  return<input className={`edit-input ${cls}`} value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>;
}

/* ── EditableList ── */
function EL({items,onChange,placeholder='アイテム'}){
  const{edit}=useData();
  if(!edit)return null;
  return(
    <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border-lt)',display:'flex',flexDirection:'column',gap:6}}>
      <p style={{fontSize:9,letterSpacing:'.2em',color:'var(--muted)',fontWeight:700}}>リストを編集</p>
      {items.map((it,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:6}}>
          <input className="edit-list-input" value={it} onChange={e=>{const n=[...items];n[i]=e.target.value;onChange(n);}} placeholder={placeholder}/>
          <button onClick={()=>onChange(items.filter((_,idx)=>idx!==i))} style={{width:22,height:22,borderRadius:1,background:'#fef2f2',border:'1px solid #fecaca',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}><TrashIc s={10} cx="text-red-400"/></button>

}

/* ── Schedule icon map ── */
function SchedIcon({type,size=15}){
  const m={train:<TrainIc s={size}/>,bus:<BusIc s={size}/>,nav:<NavIc s={size}/>,home:<HomeIc s={size}/>,game:<GameIc s={size}/>,cart:<CartIc s={size}/>,cook:<span style={{fontSize:size-2}}>🍳</span>};
  return m[type]||<NavIc s={size}/>;
}

/* ── Schedule item status ── */
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function getStatus(items,idx,now,day){
  const m=now.getMonth()+1,d=now.getDate();
  if(m!==5||d!==day)return m>5||(m===5&&d>day)?'past':'future';
  const nowMin=now.getHours()*60+now.getMinutes();
  const s=toMin(items[idx].time),e=idx+1<items.length?toMin(items[idx+1].time):1440;
  if(nowMin>=s&&nowMin<e)return'current';
  return nowMin>=e?'past':'future';
}

/* ──────────────────────────────
   HOME TAB
────────────────────────────── */
function HomeTab({onNavigate}){
  const{data,setData,edit}=useData();
  const hd=data.home;
  const upHome=p=>setData({...data,home:{...hd,...p}});
  const[now,setNow]=useState(new Date());
  const[diff,setDiff]=useState(new Date(hd.targetDate)-Date.now());
  useEffect(()=>{
    const id=setInterval(()=>{setNow(new Date());setDiff(new Date(hd.targetDate)-Date.now());},1000);
    return()=>clearInterval(id);
  },[hd.targetDate]);

  const total=Math.max(0,Math.floor(diff/1000));
  const d=Math.floor(total/86400),h=Math.floor((total%86400)/3600),m=Math.floor((total%3600)/60),s=total%60;
  const pad=n=>String(n).padStart(2,'0');

  const isEvent=now.getMonth()+1===5&&(now.getDate()===5||now.getDate()===6);
  const nowMin=now.getHours()*60+now.getMinutes();
  const allItems=[...data.schedule.day1.map(i=>({...i,day:5})),...data.schedule.day2.map(i=>({...i,day:6}))];
  const curItem=isEvent?allItems.filter(i=>i.day===now.getDate()).reduce((acc,it,idx,arr)=>{
    const s=toMin(it.time),e=idx+1<arr.length?toMin(arr[idx+1].time):1440;
    return nowMin>=s&&nowMin<e?it:acc;
  },null):null;

  return(
    <div className="tab-content" style={{padding:'40px 28px 28px',display:'flex',flexDirection:'column',gap:20}}>

        </h1>
        <p style={{fontSize:13,fontWeight:600,letterSpacing:'.18em',color:'var(--accent)',margin:'0 0 4px'}}>
          <ET val={hd.subtitle} onChange={v=>upHome({subtitle:v})} placeholder="サブタイトル"/>
        </p>
        <p style={{fontSize:11,letterSpacing:'.14em',color:'var(--muted)'}}>
          <ET val={hd.dateLabel} onChange={v=>upHome({dateLabel:v})} placeholder="日付"/>

      {/* Quick cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>

            transition:'opacity .15s',fontFamily:'inherit',

            onMouseEnter={e=>e.currentTarget.style.opacity='.75'}

            <p style={{fontSize:12,fontWeight:700,letterSpacing:'.1em',color:'var(--text)',margin:'0 0 3px'}}>{label}</p>
            <p style={{fontSize:10,color:'var(--muted)',letterSpacing:'.08em'}}>{sub}</p>

      {/* Message */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4,padding:'20px'}}>

  );
}

function SchedItem({item,idx,items,now,day,edit,onChange,onDelete}){
  const st=getStatus(items,idx,now,day);
  const isLast=idx===items.length-1;
  return(
    <div className="flex gap-3">
      <div className="flex flex-col items-center">
        <div style={{
          width:28,height:28,borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center',
          flexShrink:0,zIndex:10,transition:'all .2s',
          background:st==='current'?'var(--accent)':st==='past'?'var(--border)':'var(--surface)',
          border:st==='current'?'none':`1px solid ${st==='past'?'var(--border)':'var(--border)'}`,
          boxShadow:st==='current'?'0 2px 10px rgba(124,28,44,.35)':'none',
        }}>
          <span style={{color:st==='current'?'white':'var(--muted)',display:'flex'}}>
            <SchedIcon type={item.icon} size={13}/>
          </span>
        </div>
        {!isLast&&<div style={{width:1,flex:1,margin:'3px 0',background:'var(--border-lt)',minHeight:14}}/>}
      </div>
      <div style={{flex:1,paddingBottom:12,opacity:st==='past'&&!edit?.4:1}}>
        <div style={{
          borderRadius:3,padding:'8px 10px',transition:'all .2s',
          background:st==='current'?'var(--surface)':'transparent',
          border:st==='current'?'1px solid var(--border)':'1px solid transparent',
        }}>
          <div style={{display:'flex',alignItems:'baseline',gap:8}}>
            {edit
              ?<input className="edit-input" style={{fontSize:13,fontWeight:700,width:72}} value={item.time} onChange={e=>onChange({...item,time:e.target.value})}/>
              :<span style={{fontSize:13,fontWeight:700,fontVariantNumeric:'tabular-nums',color:st==='current'?'var(--accent)':'var(--muted)'}}>{item.time}</span>
            }
            {st==='current'&&!edit&&<span style={{fontSize:9,padding:'2px 8px',background:'var(--accent)',color:'white',letterSpacing:'.14em',fontWeight:700}}>NOW</span>}
          </div>
          {edit
            ?<div className="space-y-1 mt-1">
                <input className="edit-input text-sm font-medium w-full" value={item.label} onChange={e=>onChange({...item,label:e.target.value})} placeholder="ラベル"/>
                <input className="edit-input text-xs w-full" value={item.note||''} onChange={e=>onChange({...item,note:e.target.value})} placeholder="メモ（任意）"/>
                <div className="flex gap-2 mt-1">
                  <select className="edit-list-input text-xs" value={item.icon||'nav'} onChange={e=>onChange({...item,icon:e.target.value})}>
                    {['train','bus','nav','home','game','cart','cook'].map(v=><option key={v} value={v}>{v}</option>)}
                  </select>
                  <button onClick={onDelete} className="px-2 py-1 rounded-lg bg-red-50 text-red-400 text-xs flex items-center gap-1"><TrashIc s={11}/> 削除</button>
                </div>
              </div>
            :<div>
                <p style={{fontSize:13,fontWeight:600,marginTop:2,color:'var(--text)',letterSpacing:'.04em'}}>{item.label}</p>
                {item.note&&<p style={{fontSize:11,color:'var(--muted)',marginTop:2,letterSpacing:'.04em'}}>{item.note}</p>}
              </div>
          }
        </div>
      </div>
    </div>
  );
}

function CopyBtn({value}){
  const[copied,setCopied]=useState(false);
  const handle=async()=>{try{await navigator.clipboard.writeText(value);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return(
    <button onClick={handle} style={{
      display:'flex',alignItems:'center',gap:8,padding:'10px 12px',
      fontFamily:'monospace',fontSize:13,color:'var(--text)',
      background:'var(--bg)',border:'1px solid var(--border)',borderRadius:2,
      width:'100%',cursor:'pointer',transition:'opacity .15s',

      onMouseEnter={e=>e.currentTarget.style.opacity='.75'}
      onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
      <span style={{flex:1,textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{value}</span>
      <span className="flex-shrink-0">{copied?<CheckIc s={14} cx="text-emerald-500"/>:<CopyIc s={14} cx="text-stone-400"/>}</span>
    </button>
  );
}

function ShoppingList(){

  const upList=v=>{setData({...data,activity:{...data.activity,shopping:v}});setChecked(v.map(()=>false));};

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>

          <span style={{fontSize:10,color:'var(--muted)',letterSpacing:'.08em'}}>{done}/{items.length}</span>

        </div>

      <div style={{display:'flex',flexDirection:'column',gap:2}}>

            width:'100%',display:'flex',alignItems:'center',gap:10,
            padding:'8px 6px',background:'none',border:'none',cursor:'pointer',textAlign:'left',
            borderBottom:'1px solid var(--border-lt)',fontFamily:'inherit',
          }}>
            <div style={{
              width:16,height:16,borderRadius:1,flexShrink:0,

function GameScore(){
  const{data,setData,edit}=useData();
  const act=data.activity;
  const[scores,setScores]=useState([{wins:0,asset:''},{wins:0,asset:''}]);
  const[logs,setLogs]=useState([]);
  const[game,setGame]=useState('桃鉄');
  const upWins=(i,d)=>setScores(p=>p.map((s,idx)=>idx===i?{...s,wins:Math.max(0,s.wins+d)}:s));
  const upAsset=(i,v)=>setScores(p=>p.map((s,idx)=>idx===i?{...s,asset:v}:s));
  const addLog=()=>{
    const w=scores[0].wins>scores[1].wins?act.playerNames[0]:scores[1].wins>scores[0].wins?act.playerNames[1]:'引き分け';
    setLogs(p=>[{game,winner:w,s0:`${act.playerNames[0]} ${scores[0].wins}勝`,s1:`${act.playerNames[1]} ${scores[1].wins}勝`,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})},...p].slice(0,8));
    showToast(`🏆 ${w} の勝ち！`);
  };
  const upNames=v=>setData({...data,activity:{...act,playerNames:v}});
  const C={background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4,padding:'18px 18px 14px'};
  return(
    <div style={C}>
      <p style={{fontSize:10,fontWeight:700,letterSpacing:'.2em',color:'var(--navy)',marginBottom:14}}>桃鉄・ボドゲ戦績</p>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        {['桃鉄','カタン','ナナ','UNO'].map(g=>(
          <button key={g} onClick={()=>setGame(g)} style={{
            fontSize:11,padding:'4px 12px',border:'1px solid',letterSpacing:'.1em',cursor:'pointer',
            background:game===g?'var(--navy)':'transparent',
            borderColor:game===g?'var(--navy)':'var(--border)',
            color:game===g?'white':'var(--sub)',fontFamily:'inherit',borderRadius:1,
          }}>{g}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        {scores.map((p,i)=>(
          <div key={i} style={{background:'var(--bg)',border:'1px solid var(--border-lt)',borderRadius:2,padding:'12px 8px',textAlign:'center'}}>
            <p style={{fontSize:11,fontWeight:700,color:'var(--sub)',letterSpacing:'.1em',marginBottom:10}}>
              {edit
                ?<input className="edit-list-input" style={{textAlign:'center',width:'100%'}} value={act.playerNames[i]} onChange={e=>{const n=[...act.playerNames];n[i]=e.target.value;upNames(n);}}/>
                :act.playerNames[i]
              }
            </p>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:6}}>
              <button onClick={()=>upWins(i,-1)} style={{width:28,height:28,borderRadius:1,border:'1px solid var(--border)',background:'var(--surface)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><MinusIc cx=""/></button>
              <span style={{fontSize:24,fontWeight:700,color:'var(--text)',fontVariantNumeric:'tabular-nums',width:32,textAlign:'center'}}>{p.wins}</span>
              <button onClick={()=>upWins(i,1)} style={{width:28,height:28,borderRadius:1,background:'var(--navy)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><PlusIc cx="text-white"/></button>
            </div>
            <p style={{fontSize:9,color:'var(--muted)',letterSpacing:'.14em',marginBottom:6}}>勝利数</p>
            <input type="text" placeholder="資産額" value={p.asset} onChange={e=>upAsset(i,e.target.value)}
              style={{width:'100%',fontSize:11,textAlign:'center',padding:'4px 6px',background:'var(--surface)',border:'1px solid var(--border-lt)',borderRadius:1,outline:'none',color:'var(--text)',fontFamily:'inherit'}}/>
          </div>
        ))}
      </div>
      <button onClick={addLog} style={{
        width:'100%',background:'var(--navy)',color:'white',fontSize:12,fontWeight:700,
        padding:'11px 0',border:'none',cursor:'pointer',letterSpacing:'.16em',
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'inherit',borderRadius:1,
      }}>
        <TrophyIc/> 記　録
      </button>
      {logs.length>0&&(
        <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:6}}>
          <p style={{fontSize:9,color:'var(--muted)',letterSpacing:'.18em',fontWeight:700}}>戦績ログ</p>
          {logs.map((l,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'var(--bg)',border:'1px solid var(--border-lt)',borderRadius:1}}>
              <div><p style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{l.game}</p><p style={{fontSize:10,color:'var(--muted)'}}>{l.s0} / {l.s1}</p></div>
              <div style={{textAlign:'right'}}><p style={{fontSize:12,fontWeight:700,color:'var(--accent)'}}>{l.winner}</p><p style={{fontSize:10,color:'var(--muted)'}}>{l.time}</p></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function GachaCard({title,listKey,color,label}){
  const{data,setData,edit}=useData();
  const items=data.activity[listKey];
  const[result,setResult]=useState(null);
  const[spin,setSpin]=useState(false);
  const go=()=>{setSpin(true);setResult(null);setTimeout(()=>{setResult(items[Math.floor(Math.random()*items.length)]);setSpin(false);},380);};
  return(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4,padding:'18px 18px 14px'}}>
      <p style={{fontSize:10,fontWeight:700,letterSpacing:'.2em',color:'var(--navy)',marginBottom:14}}>{title}</p>
      <button onClick={go} disabled={spin||items.length===0} style={{
        width:'100%',padding:'11px 0',background:color,color:'white',
        border:'none',cursor:'pointer',letterSpacing:'.14em',fontSize:12,fontWeight:700,
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'inherit',borderRadius:1,
        opacity:spin||items.length===0?.6:1,transition:'opacity .15s',
      }}>
        <ShuffleIc cx={spin?'animate-spin':''}/>{spin?'...':`${label}`}
      </button>
      {result&&(
        <div style={{marginTop:12,padding:'16px 0',textAlign:'center',borderTop:'1px solid var(--border-lt)'}}>
          <p style={{fontSize:20,fontWeight:700,color,letterSpacing:'.08em'}}>{result}</p>
        </div>
      )}
      <EL items={items} onChange={v=>setData({...data,activity:{...data.activity,[listKey]:v}})} placeholder="候補を追加"/>
    </div>
  );
}

function ActivityTab(){
  return(
    <div className="tab-content" style={{padding:'36px 28px 28px',display:'flex',flexDirection:'column',gap:16}}>
      <div style={{borderBottom:'1px solid var(--border-lt)',paddingBottom:12}}>
        <p style={{fontSize:11,letterSpacing:'.28em',color:'var(--muted)',marginBottom:4}}>ACTIVITY</p>
        <h2 style={{fontSize:18,fontWeight:700,letterSpacing:'.1em',color:'var(--text)'}}>お楽しみ</h2>
      </div>
      <ShoppingList/>
      <GameScore/>
      <GachaCard title="何作る？ガチャ" listKey="recipes" color="var(--accent)" label="ガチャる"/>
      <GachaCard title="何観る？ガチャ"  listKey="movies"  color="var(--navy)"  label="ガチャる"/>
    </div>
  );
}

/* ──────────────────────────────
   APP
────────────────────────────── */
const TABS=[
  {id:'home',     label:'Home',     Ico:HomeIc},
  {id:'schedule', label:'Schedule', Ico:CalIc},
  {id:'guide',    label:'Guide',    Ico:BookIc},
  {id:'activity', label:'Activity', Ico:SparkIc},
];
const COMPS={home:HomeTab,schedule:ScheduleTab,guide:GuideTab,activity:ActivityTab};

/* debounced auto-save indicator */
function useSaveIndicator(){
  const[saved,setSaved]=useState(false);
  const timer=useRef(null);
  const trigger=()=>{
    setSaved(true);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>setSaved(false),1800);
  };
  return[saved,trigger];
}

const LABELS={home:'ご案内',schedule:'旅程',guide:'お部屋',activity:'お楽しみ'};

function App(){
  const[tab,setTab]=useState('home');
  const[edit,setEdit]=useState(false);
  const[data,setData]=useLS('stayover-v2',DEFAULT);
  const[saved,triggerSave]=useSaveIndicator();

  const saveData=(nd)=>{setData(nd);triggerSave();};
  const toggleEdit=()=>setEdit(e=>!e);

  const Comp=COMPS[tab];
  return(
    <Ctx.Provider value={{data,setData:saveData,edit}}>
      <div className="app-shell">

        {/* Desktop site header */}
        <header className="site-header">
          <div className="site-header-logo">Our First Stayover</div>
          <nav className="site-header-nav">
            {TABS.map(({id})=>(
              <button key={id} onClick={()=>setTab(id)}
                className={`site-nav-btn${tab===id?' active':''}`}>
                {LABELS[id]}
              </button>
            ))}
          </nav>
          <button onClick={toggleEdit} style={{
            marginLeft:32,background:'none',border:'1px solid var(--border)',
            borderRadius:2,cursor:'pointer',padding:'6px 14px',
            fontFamily:'inherit',fontSize:11,letterSpacing:'.14em',
            color:edit?'var(--accent)':'var(--sub)',
            transition:'color .2s',
          }}>
            {edit?'完了':'編集'}
          </button>
        </header>

        {/* Edit mode banner */}
        {edit&&(
          <div className="edit-banner" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px'}}>
            <span>✏️ 編集モード</span>
            <span style={{
              fontSize:'10px',padding:'2px 10px',borderRadius:'2px',
              background:saved?'#3a6640':'transparent',
              color:saved?'white':'transparent',
              transition:'all .3s',fontWeight:600,letterSpacing:'.1em',
            }}>{saved?'保存済み ✓':''}</span>
          </div>
        )}

        {/* Content */}
        <main className="app-main">
          <Comp onNavigate={setTab}/>
        </main>

        {/* Edit FAB (mobile only, hidden on desktop via CSS if desired) */}
        <button onClick={toggleEdit} className="edit-fab"
          style={{background:edit?'var(--accent)':'var(--navy)',color:'white'}}>
          {edit?<CheckIc s={18} cx="text-white"/>:<PencilIc s={15} cx="text-white"/>}
        </button>

        {/* Mobile bottom nav */}
        <nav className="app-nav">
          {TABS.map(({id,Ico})=>{
            const on=tab===id;
            return(
              <button key={id} onClick={()=>setTab(id)} style={{
                flex:1,display:'flex',flexDirection:'column',
                alignItems:'center',justifyContent:'center',
                paddingTop:8,paddingBottom:10,gap:3,
                border:'none',background:'none',cursor:'pointer',
                transition:'color .15s',
                color:on?'var(--accent)':'var(--muted)',
                fontFamily:'inherit',
              }}>
                <Ico s={19} sw={on?2.2:1.6}/>
                <span style={{fontSize:'9px',fontWeight:on?700:400,letterSpacing:'.14em'}}>{LABELS[id]}</span>
                {on&&<span style={{width:'16px',height:'1px',background:'var(--accent)',marginTop:'1px'}}/>}
              </button>
            );
          })}
        </nav>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
