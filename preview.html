  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;

/* ── App shell: flex column ── */
.app-shell{
  display:flex;flex-direction:column;
  height:100%;width:100%;max-width:480px;margin:0 auto;
  background:#fdf8f0;position:relative;
  overflow:hidden;
}
/* ── Desktop: full screen ── */

  html,body,#root{height:100vh;}

.app-nav{
  flex-shrink:0;background:white;
  border-top:1px solid #f0ede8;display:flex;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}

  position:absolute;bottom:76px;right:16px;

  border:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  transition:transform .15s;z-index:20;
}
.edit-fab:active{transform:scale(.9);}
.edit-banner{
  background:#fff7ed;border-bottom:1px solid #fed7aa;
  text-align:center;padding:6px;font-size:12px;
  font-weight:700;color:#c2410c;flex-shrink:0;
}
.tab-content{animation:fadeSlide .18s ease-out both;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.edit-input{background:rgba(255,247,230,.9);border:1.5px dashed #f97316;border-radius:8px;padding:4px 8px;width:100%;font-size:inherit;font-family:inherit;color:inherit;outline:none;resize:none;}
.edit-input:focus{border-color:#fb923c;background:#fff7ed;}
.edit-list-input{background:rgba(255,247,230,.8);border:1px dashed #f97316;border-radius:6px;padding:3px 6px;font-size:.75rem;font-family:inherit;outline:none;flex:1;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:8px 18px;border-radius:999px;font-size:12px;z-index:9999;pointer-events:none;animation:toastIn .2s ease-out;}

/* ── Context ── */
const Ctx = React.createContext();

function useData(){return useContext(Ctx);}

/* ── Toast ── */
function showToast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1800);
}

/* ── useLocalStorage ── */
function useLS(key,def){
  const [v,sv]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}
  });
  const set=(nv)=>{sv(nv);try{localStorage.setItem(key,JSON.stringify(nv));}catch{}};
  return[v,set];
}

/* ── EditableText ── */
function ET({val,onChange,multi=false,cls='',placeholder=''}){
  const{edit}=useData();
  if(!edit)return <span className={cls} style={{whiteSpace:'pre-wrap'}}>{val||<span className="text-stone-300">{placeholder}</span>}</span>;
  if(multi)return<textarea className={`edit-input ${cls}`} value={val} rows={3} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>;
  return<input className={`edit-input ${cls}`} value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>;
}

/* ── EditableList ── */
function EL({items,onChange,placeholder='アイテム'}){
  const{edit}=useData();
  if(!edit)return null;
  return(
    <div className="mt-3 space-y-1.5 pt-3 border-t border-orange-100">
      <p className="text-xs text-orange-400 font-medium mb-2">リストを編集</p>
      {items.map((it,i)=>(
        <div key={i} className="flex items-center gap-2">
          <input className="edit-list-input" value={it} onChange={e=>{const n=[...items];n[i]=e.target.value;onChange(n);}} placeholder={placeholder}/>
          <button onClick={()=>onChange(items.filter((_,idx)=>idx!==i))} className="w-6 h-6 rounded-full bg-red-50 flex items-center justify-center flex-shrink-0"><TrashIc s={11} cx="text-red-400"/></button>
        </div>
      ))}
      <button onClick={()=>onChange([...items,''])} className="flex items-center gap-1.5 text-xs text-orange-500 mt-1 font-medium">
        <PlusIc s={12} cx="text-orange-400"/> 追加
      </button>
    </div>
  );
}

/* ── Schedule icon map ── */
function SchedIcon({type,size=15}){
  const m={train:<TrainIc s={size}/>,bus:<BusIc s={size}/>,nav:<NavIc s={size}/>,home:<HomeIc s={size}/>,game:<GameIc s={size}/>,cart:<CartIc s={size}/>,cook:<span style={{fontSize:size-2}}>🍳</span>};
  return m[type]||<NavIc s={size}/>;
}

/* ── Schedule item status ── */
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function getStatus(items,idx,now,day){
  const m=now.getMonth()+1,d=now.getDate();
  if(m!==5||d!==day)return m>5||(m===5&&d>day)?'past':'future';
  const nowMin=now.getHours()*60+now.getMinutes();
  const s=toMin(items[idx].time),e=idx+1<items.length?toMin(items[idx+1].time):1440;
  if(nowMin>=s&&nowMin<e)return'current';
  return nowMin>=e?'past':'future';
}

/* ──────────────────────────────
   HOME TAB
────────────────────────────── */
function HomeTab({onNavigate}){
  const{data,setData,edit}=useData();
  const hd=data.home;
  const upHome=p=>setData({...data,home:{...hd,...p}});
  const[now,setNow]=useState(new Date());
  const[diff,setDiff]=useState(new Date(hd.targetDate)-Date.now());
  useEffect(()=>{
    const id=setInterval(()=>{setNow(new Date());setDiff(new Date(hd.targetDate)-Date.now());},1000);
    return()=>clearInterval(id);
  },[hd.targetDate]);

  const total=Math.max(0,Math.floor(diff/1000));
  const d=Math.floor(total/86400),h=Math.floor((total%86400)/3600),m=Math.floor((total%3600)/60),s=total%60;
  const pad=n=>String(n).padStart(2,'0');

  const isEvent=now.getMonth()+1===5&&(now.getDate()===5||now.getDate()===6);
  const nowMin=now.getHours()*60+now.getMinutes();
  const allItems=[...data.schedule.day1.map(i=>({...i,day:5})),...data.schedule.day2.map(i=>({...i,day:6}))];
  const curItem=isEvent?allItems.filter(i=>i.day===now.getDate()).reduce((acc,it,idx,arr)=>{
    const s=toMin(it.time),e=idx+1<arr.length?toMin(arr[idx+1].time):1440;
    return nowMin>=s&&nowMin<e?it:acc;
  },null):null;

  return(
    <div className="tab-content px-5 pt-8 pb-4 space-y-4">
      {/* Hero */}
      <div className="text-center space-y-1 pb-2">
        <div className="text-4xl mb-3">🏠✨</div>
        <h1 className="text-xl font-bold text-stone-800">
          <ET val={hd.title} onChange={v=>upHome({title:v})} placeholder="タイトル"/>
        </h1>
        <p className="text-sm font-semibold" style={{color:'#fb7185'}}>
          <ET val={hd.subtitle} onChange={v=>upHome({subtitle:v})} placeholder="サブタイトル"/>
        </p>
        <p className="text-xs text-stone-400">
          <ET val={hd.dateLabel} onChange={v=>upHome({dateLabel:v})} placeholder="日付"/>
        </p>
        {edit&&<div className="mt-2"><p className="text-xs text-orange-400 mb-1">目標日時</p><input className="edit-input text-xs text-center" value={hd.targetDate} onChange={e=>upHome({targetDate:e.target.value})} placeholder="2025-05-05T09:50:00"/></div>}
      </div>

      {/* Countdown / Now */}
      {diff>0&&!isEvent?(
        <div className="rounded-2xl p-5 border text-center" style={{background:'linear-gradient(135deg,#fff1f2,#fffbeb)',borderColor:'#fecdd3'}}>
          <p className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:'#fb7185'}}>✈️ Countdown</p>
          <div className="flex justify-center gap-4">
            {[['日',d],['時',h],['分',m],['秒',s]].map(([u,v])=>(
              <div key={u} className="flex flex-col items-center min-w-[44px]">
                <div className="bg-white rounded-xl w-full py-2 shadow-sm">
                  <span className="text-2xl font-bold tabular-nums" style={{color:'#f43f5e'}}>{pad(v)}</span>
                </div>
                <span className="text-xs text-stone-400 mt-1">{u}</span>
              </div>
            ))}
          </div>
          <p className="text-xs text-stone-400 mt-3">{hd.dateLabel} まで</p>
        </div>
      ):isEvent&&curItem?(
        <div className="rounded-2xl p-4 border" style={{background:'linear-gradient(135deg,#fff1f2,#fffbeb)',borderColor:'#fda4af'}}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-xs font-bold px-2 py-0.5 rounded-full text-white" style={{background:'#fb7185'}}>NOW</span>
            <span className="text-xs text-stone-400">現在の予定</span>
          </div>
          <p className="text-base font-bold text-stone-800">{curItem.time} — {curItem.label}</p>
        </div>
      ):isEvent?(
        <div className="rounded-2xl p-4 border border-amber-100 bg-amber-50 text-center">
          <p className="text-sm text-stone-600">全スケジュール完了！お疲れさま 🎊</p>
        </div>
      ):null}

      {/* Quick cards */}
      <div className="grid grid-cols-2 gap-3">
        {[
          {id:'schedule',label:'スケジュール',sub:'1泊2日の行程',Icon:<CalIc cx="text-sky-400" s={22}/>, grad:'from-sky-50 to-sky-100/50'},
          {id:'guide',label:'アパート案内',sub:'Wi-Fi・設備情報',Icon:<MapPinIc cx="text-emerald-400" s={22}/>, grad:'from-emerald-50 to-emerald-100/50'},

function SchedItem({item,idx,items,now,day,edit,onChange,onDelete}){
  const st=getStatus(items,idx,now,day);
  const isLast=idx===items.length-1;
  return(
    <div className="flex gap-3">
      <div className="flex flex-col items-center">
        <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 z-10 transition-all"
          style={st==='current'?{background:'#fb7185',boxShadow:'0 4px 14px #fda4af80',outline:'4px solid #ffe4e6'}:
                 st==='past'?{background:'#e7e5e4'}:{background:'white',border:'2px solid #e7e5e4'}}>
          <span style={{color:st==='current'?'white':st==='past'?'#a8a29e':'#a8a29e',display:'flex'}}>
            <SchedIcon type={item.icon} size={14}/>
          </span>
        </div>
        {!isLast&&<div className="w-0.5 flex-1 my-1 rounded-full" style={{background:st==='past'?'#e7e5e4':'#f0ede8',minHeight:'16px'}}/>}
      </div>
      <div className={`flex-1 pb-3 ${st==='past'&&!edit?'opacity-40':''}`}>
        <div className={`rounded-2xl p-3 transition-all ${st==='current'?'border shadow-sm':''}`}
          style={st==='current'?{background:'#fff1f2',borderColor:'#fda4af'}:{}}>
          <div className="flex items-baseline gap-2">
            {edit
              ?<input className="edit-input text-sm font-bold tabular-nums w-20" value={item.time} onChange={e=>onChange({...item,time:e.target.value})}/>
              :<span className="text-sm font-bold tabular-nums" style={{color:st==='current'?'#f43f5e':'#78716c'}}>{item.time}</span>
            }
            {st==='current'&&!edit&&<span className="text-xs px-2 py-0.5 rounded-full font-bold text-white" style={{background:'#fb7185',fontSize:'10px'}}>NOW</span>}
          </div>
          {edit
            ?<div className="space-y-1 mt-1">
                <input className="edit-input text-sm font-medium w-full" value={item.label} onChange={e=>onChange({...item,label:e.target.value})} placeholder="ラベル"/>
                <input className="edit-input text-xs w-full" value={item.note||''} onChange={e=>onChange({...item,note:e.target.value})} placeholder="メモ（任意）"/>
                <div className="flex gap-2 mt-1">
                  <select className="edit-list-input text-xs" value={item.icon||'nav'} onChange={e=>onChange({...item,icon:e.target.value})}>
                    {['train','bus','nav','home','game','cart','cook'].map(v=><option key={v} value={v}>{v}</option>)}
                  </select>
                  <button onClick={onDelete} className="px-2 py-1 rounded-lg bg-red-50 text-red-400 text-xs flex items-center gap-1"><TrashIc s={11}/> 削除</button>
                </div>
              </div>
            :<div>
                <p className="text-sm font-semibold mt-0.5 text-stone-700">{item.label}</p>
                {item.note&&<p className="text-xs text-stone-400 mt-0.5">{item.note}</p>}
              </div>
          }
        </div>
      </div>
    </div>
  );
}

function CopyBtn({value}){
  const[copied,setCopied]=useState(false);
  const handle=async()=>{try{await navigator.clipboard.writeText(value);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return(
    <button onClick={handle} className="flex items-center gap-2 px-3 py-2 rounded-xl font-mono text-sm text-stone-700 active:scale-95 transition-transform border border-stone-100 bg-stone-50 hover:bg-stone-100 w-full">
      <span className="flex-1 text-left truncate">{value}</span>
      <span className="flex-shrink-0">{copied?<CheckIc s={14} cx="text-emerald-500"/>:<CopyIc s={14} cx="text-stone-400"/>}</span>
    </button>
  );
}

  const upList=v=>{setData({...data,activity:{...data.activity,shopping:v}});setChecked(v.map(()=>false));};

function GameScore(){
  const{data,setData,edit}=useData();
  const act=data.activity;
  const[scores,setScores]=useState([{wins:0,asset:''},{wins:0,asset:''}]);
  const[logs,setLogs]=useState([]);
  const[game,setGame]=useState('桃鉄');
  const upWins=(i,d)=>setScores(p=>p.map((s,idx)=>idx===i?{...s,wins:Math.max(0,s.wins+d)}:s));
  const upAsset=(i,v)=>setScores(p=>p.map((s,idx)=>idx===i?{...s,asset:v}:s));
  const addLog=()=>{
    const w=scores[0].wins>scores[1].wins?act.playerNames[0]:scores[1].wins>scores[0].wins?act.playerNames[1]:'引き分け';
    setLogs(p=>[{game,winner:w,s0:`${act.playerNames[0]} ${scores[0].wins}勝`,s1:`${act.playerNames[1]} ${scores[1].wins}勝`,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})},...p].slice(0,8));
    showToast(`🏆 ${w} の勝ち！`);
  };
  const upNames=v=>setData({...data,activity:{...act,playerNames:v}});

  return(
    <div className="bg-white rounded-2xl p-5 border border-stone-100 shadow-sm space-y-4">
      <div className="flex items-center gap-2"><GameIc cx="text-purple-400"/><h3 className="text-sm font-bold text-stone-700">桃鉄・ボドゲ戦績</h3></div>
      <div className="flex gap-2 flex-wrap">
        {['桃鉄','カタン','ナナ','UNO'].map(g=>(
          <button key={g} onClick={()=>setGame(g)} className="text-xs px-3 py-1.5 rounded-full border transition-all font-medium"
            style={{background:game===g?'#a78bfa':'white',borderColor:game===g?'#a78bfa':'#e7e5e4',color:game===g?'white':'#78716c'}}>{g}</button>
        ))}
      </div>
      <div className="grid grid-cols-2 gap-3">
        {scores.map((p,i)=>(
          <div key={i} className="rounded-2xl p-3 space-y-2.5" style={{background:'#fafaf9',border:'1px solid #f0ede8'}}>
            <p className="text-xs font-bold text-stone-600 text-center">
              {edit
                ?<input className="edit-list-input text-center w-full" value={act.playerNames[i]} onChange={e=>{const n=[...act.playerNames];n[i]=e.target.value;upNames(n);}}/>
                :act.playerNames[i]
              }
            </p>
            <div className="flex items-center justify-center gap-2">
              <button onClick={()=>upWins(i,-1)} className="w-8 h-8 rounded-full flex items-center justify-center border border-stone-200 bg-white active:scale-90 transition-transform"><MinusIc cx="text-stone-500"/></button>
              <span className="text-2xl font-bold text-stone-800 tabular-nums w-10 text-center">{p.wins}</span>
              <button onClick={()=>upWins(i,1)} className="w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-transform" style={{background:'#a78bfa'}}><PlusIc cx="text-white"/></button>
            </div>
            <p className="text-xs text-stone-400 text-center">勝利数</p>
            <input type="text" placeholder="資産額を入力" value={p.asset} onChange={e=>upAsset(i,e.target.value)}
              className="w-full text-xs text-center rounded-xl px-2 py-2 text-stone-700 focus:outline-none bg-white border border-stone-100"/>
          </div>
        ))}
      </div>
      <button onClick={addLog} className="w-full text-white text-sm font-bold py-3 rounded-2xl active:scale-98 transition-transform flex items-center justify-center gap-2 shadow-sm" style={{background:'linear-gradient(135deg,#a78bfa,#8b5cf6)'}}>
        <TrophyIc/> このゲームを記録する
      </button>
      {logs.length>0&&(
        <div className="space-y-2">
          <p className="text-xs text-stone-400 font-semibold">戦績ログ</p>
          {logs.map((l,i)=>(
            <div key={i} className="flex items-center justify-between rounded-xl px-3 py-2.5" style={{background:'#fafaf9',border:'1px solid #f0ede8'}}>
              <div><p className="text-xs font-bold text-stone-700">{l.game}</p><p className="text-xs text-stone-400">{l.s0} / {l.s1}</p></div>
              <div className="text-right"><p className="text-xs font-bold" style={{color:'#a78bfa'}}>{l.winner}</p><p className="text-xs text-stone-400">{l.time}</p></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function GachaCard({title,listKey,color,bg,border}){
  const{data,setData,edit}=useData();
  const items=data.activity[listKey];
  const[result,setResult]=useState(null);
  const[spin,setSpin]=useState(false);
  const go=()=>{setSpin(true);setResult(null);setTimeout(()=>{setResult(items[Math.floor(Math.random()*items.length)]);setSpin(false);},380);};
  return(
    <div className="bg-white rounded-2xl p-5 border border-stone-100 shadow-sm">
      <h3 className="text-sm font-bold text-stone-700 mb-4">{title}</h3>
      <button onClick={go} disabled={spin||items.length===0} className="w-full py-3 rounded-2xl font-bold text-sm text-white flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-sm"
        style={{background:`linear-gradient(135deg,${color},${color}cc)`,opacity:spin||items.length===0?0.7:1}}>
        <ShuffleIc cx={spin?'animate-spin':''}/>
        {spin?'ガチャ中...':`${title}！`}

      {result&&(
        <div className="mt-3 rounded-2xl py-4 text-center border" style={{background:bg,borderColor:border}}>
          <p className="text-2xl font-bold" style={{color}}>{result}</p>

/* ──────────────────────────────
   APP
────────────────────────────── */
const TABS=[
  {id:'home',     label:'Home',     Ico:HomeIc},
  {id:'schedule', label:'Schedule', Ico:CalIc},
  {id:'guide',    label:'Guide',    Ico:BookIc},
  {id:'activity', label:'Activity', Ico:SparkIc},
];
const COMPS={home:HomeTab,schedule:ScheduleTab,guide:GuideTab,activity:ActivityTab};

/* debounced auto-save indicator */
function useSaveIndicator(){
  const[saved,setSaved]=useState(false);
  const timer=useRef(null);
  const trigger=()=>{
    setSaved(true);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>setSaved(false),1800);
  };
  return[saved,trigger];
}

function App(){
  const[tab,setTab]=useState('home');
  const[edit,setEdit]=useState(false);
  const[data,setData]=useLS('stayover-v2',DEFAULT);
  const[saved,triggerSave]=useSaveIndicator();

  // 変更のたびに即座にlocalStorageへ保存（トースト不要）
  const saveData=(nd)=>{setData(nd);triggerSave();};
  const toggleEdit=()=>setEdit(e=>!e);

  const Comp=COMPS[tab];
  return(
    <Ctx.Provider value={{data,setData:saveData,edit}}>
      <div className="app-shell">
        {/* Edit mode banner with live save indicator */}
        {edit&&(
          <div className="edit-banner" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
            <span>✏️ 編集モード</span>
            <span style={{
              fontSize:'10px',padding:'2px 8px',borderRadius:'999px',
              background:saved?'#22c55e':'transparent',
              color:saved?'white':'transparent',
              transition:'all .3s',fontWeight:600,
            }}>{saved?'保存済み ✓':''}</span>
          </div>
        )}

        {/* Scrollable content */}
        <main className="app-main">
          <Comp onNavigate={setTab}/>
        </main>

        {/* Floating edit button */}
        <button onClick={toggleEdit} className="edit-fab"
          style={{background:edit?'#f97316':'#1c1917',color:'white'}}>
          {edit?<CheckIc s={20} cx="text-white"/>:<PencilIc s={16} cx="text-white"/>}
        </button>

        {/* Tab bar */}
        <nav className="app-nav">
          {TABS.map(({id,label,Ico})=>{
            const on=tab===id;
            return(
              <button key={id} onClick={()=>setTab(id)}
                style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingTop:'8px',paddingBottom:'12px',gap:'3px',border:'none',background:'none',cursor:'pointer',transition:'color .15s',color:on?'#fb7185':'#a8a29e'}}>
                <Ico s={21} sw={on?2.4:1.8}/>
                <span style={{fontSize:'10px',fontWeight:on?700:400,letterSpacing:'0.04em'}}>{label}</span>
                {on&&<span style={{width:'4px',height:'4px',borderRadius:'50%',background:'#fb7185',marginTop:'-1px'}}/>}
              </button>
            );
          })}
        </nav>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
